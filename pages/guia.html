  <style>
    .guia-meta { display: flex; gap: .5rem; justify-content: center; flex-wrap: wrap; margin-top: 1rem; }
    .guia-meta span { font-family: var(--font-mono); font-size: .75rem; padding: .25rem .7rem; border-radius: 999px; border: 1px solid var(--border-soft); color: var(--text-dim); }
    .guia-back { display: inline-block; color: var(--text-mute); font-size: .85rem; margin-bottom: 1.5rem; text-decoration: none; }
    .guia-back:hover { color: var(--text); }
    .guia-shot { display: block; max-width: 100%; border-radius: 14px; border: 1px solid var(--border-soft); margin: 1.5rem auto; box-shadow: 0 20px 60px -25px rgba(0,0,0,.7); }
    .guia-shot-cap { display: block; text-align: center; color: var(--text-mute); font-size: .85rem; margin: -.5rem auto 1.5rem; font-style: italic; max-width: 700px; }
    .prompt-card { position: relative; background: rgba(124,92,255,.06); border: 1px solid rgba(124,92,255,.3); border-radius: 14px; padding: 1.25rem; }
    .prompt-card__copy { position: absolute; top: .75rem; right: .75rem; font-family: var(--font-mono); font-size: .75rem; font-weight: 600; padding: .4rem .75rem; border-radius: 999px; cursor: pointer; background: rgba(124,92,255,.18); border: 1px solid rgba(124,92,255,.45); color: #b9a7ff; transition: background .15s; }
    .prompt-card__copy:hover { background: rgba(124,92,255,.3); }
    .prompt-card__text { margin: 0; padding-right: 5.5rem; white-space: pre-wrap; word-break: break-word; font-family: var(--font-mono); font-size: .85rem; line-height: 1.6; color: var(--text); background: none; border: none; }
  </style>
